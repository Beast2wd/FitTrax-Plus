workflows:
  ios-build:
    name: iOS App Store Build
    max_build_duration: 120
    working_directory: frontend
    instance_type: mac_mini_m1
    environment:
      xcode: 15.2
      node: 18.18.0
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "ios/fittraxplus.xcworkspace" \
            --scheme "fittraxplus"
    artifacts:
      - frontend/ios/build/Build/Products/*/*.ipa
      - frontend/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
