workflows:
  expo-ios-build:
    name: Expo iOS Build
    max_build_duration: 120
    working_directory: frontend
    instance_type: mac_mini_m1
    environment:
      xcode: 15.2
      node: 18.18.0
      cocoapods: default
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: "com.fittraxplus.app"
    scripts:
      - name: Install dependencies
        script: |
          yarn install
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "ios/fittraxplus.xcworkspace" \
            --scheme "fittraxplus" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - frontend/ios/build/Build/Products/*/*.ipa
      - frontend/ios/build/Build/Products/*/*.app
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - aj.castillo3d@outlook.com
        notify:
          success: true
          failure: true
